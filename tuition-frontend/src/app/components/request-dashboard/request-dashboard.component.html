<div class="container mt-5">
  <mat-card class="dashboard-card">
    <mat-card-title class="mb-4 d-flex align-items-center">
      <mat-icon color="primary" class="mr-2">dashboard</mat-icon>
      {{ currentUser?.role === 'STUDENT' ? 'Your Tuition Requests' : 'Incoming Requests Dashboard' }}
    </mat-card-title>

    <div *ngIf="loading" class="text-center my-4">
      <mat-spinner diameter="40" class="mx-auto"></mat-spinner>
    </div>

    <div *ngIf="!loading && requests.length === 0" class="text-center my-5 py-5 border rounded bg-light">
      <mat-icon style="font-size: 48px; height: 48px; width: 48px; color: #999;">inbox</mat-icon>
      <p class="text-muted mt-3">No requests found at the moment.</p>
    </div>

    <div class="table-responsive" *ngIf="!loading && requests.length > 0">
      <table mat-table [dataSource]="requests" class="full-width">
        
        <!-- Student Name Column -->
        <ng-container matColumnDef="studentName">
          <th mat-header-cell *matHeaderCellDef> Student Name </th>
          <td mat-cell *matCellDef="let element"> 
            <div class="d-flex align-items-center">
                <mat-icon class="mr-2 text-muted">person</mat-icon>
                {{element.student.name}} 
            </div>
          </td>
        </ng-container>

        <!-- Tutor Name Column -->
        <ng-container matColumnDef="tutorName">
          <th mat-header-cell *matHeaderCellDef> Tutor Name </th>
          <td mat-cell *matCellDef="let element"> 
            <div class="d-flex align-items-center">
                <mat-icon class="mr-2 text-muted">school</mat-icon>
                {{element.tutor.name}} 
            </div>
          </td>
        </ng-container>

        <!-- Status Column -->
        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef> Current Status </th>
          <td mat-cell *matCellDef="let element">
            <span class="status-badge" [ngClass]="element.status.toLowerCase()">
              {{element.status}}
            </span>
          </td>
        </ng-container>

        <!-- Actions Column -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef> Actions </th>
          <td mat-cell *matCellDef="let element">
            <div *ngIf="element.status === 'PENDING'">
              <button mat-icon-button color="primary" (click)="updateStatus(element.id, 'ACCEPTED')" matTooltip="Accept Request">
                <mat-icon>check_circle</mat-icon>
              </button>
              <button mat-icon-button color="warn" (click)="updateStatus(element.id, 'REJECTED')" matTooltip="Reject Request">
                <mat-icon>cancel</mat-icon>
              </button>
            </div>
            <span *ngIf="element.status !== 'PENDING'" class="text-muted small italic">Processed</span>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </div>
  </mat-card>
</div>
