<div class="form-container">
  <mat-card class="register-card">
    <mat-card-title class="text-center mb-4">Create Account</mat-card-title>
    <mat-card-content>
      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Full Name</mat-label>
          <input matInput formControlName="name" placeholder="Enter your name">
          <mat-error *ngIf="registerForm.get('name')?.hasError('required')">Name is required</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email Address</mat-label>
          <input matInput formControlName="email" placeholder="Enter your email">
          <mat-error *ngIf="registerForm.get('email')?.hasError('required')">Email is required</mat-error>
          <mat-error *ngIf="registerForm.get('email')?.hasError('email')">Invalid email format</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput type="password" formControlName="password" placeholder="Enter password">
          <mat-error *ngIf="registerForm.get('password')?.hasError('required')">Password is required</mat-error>
          <mat-error *ngIf="registerForm.get('password')?.hasError('minlength')">Minimum 6 characters</mat-error>
        </mat-form-field>

        <div class="role-selection">
          <label id="role-label">I am a: </label>
          <mat-radio-group aria-labelledby="role-label" formControlName="role">
            <mat-radio-button value="STUDENT" class="mr-3">Student</mat-radio-button>
            <mat-radio-button value="TUTOR">Tutor</mat-radio-button>
          </mat-radio-group>
        </div>

        <button mat-raised-button color="primary" type="submit" [disabled]="registerForm.invalid" class="full-width mt-3">
          Register
        </button>
      </form>
    </mat-card-content>
    <mat-card-footer class="text-center pb-3">
      Already have an account? <a routerLink="/login">Login here</a>
    </mat-card-footer>
  </mat-card>
</div>
